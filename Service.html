<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muinov Almaz Service</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f0f0f;
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 10%;
    background:#111;
}

.logo{
    font-size:24px;
    font-weight:bold;
    color:#00ff9d;
}

nav a{
    color:white;
    margin-left:20px;
    text-decoration:none;
    transition:0.3s;
}

nav a:hover{
    color:#00ff9d;
}

.hero{
    text-align:center;
    padding:120px 20px;
}

.hero h1{
    font-size:50px;
}

.hero span{
    color:#00ff9d;
}

.hero p{
    color:#aaa;
    margin-top:10px;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:15px 35px;
    background:#00ff9d;
    color:black;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

.services{
    padding:80px 10%;
}

.services h2{
    text-align:center;
    margin-bottom:50px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.card{
    background:#161616;
    padding:30px;
    border-radius:10px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    background:#1f1f1f;
}

.price{
    font-size:25px;
    color:#00ff9d;
    margin-top:10px;
}

footer{
    text-align:center;
    padding:30px;
    background:#111;
    margin-top:50px;
    color:#777;
}
</style>

</head>
<body>

<header>
<div class="logo">MUINOV ALMAZ</div>

<nav>
<a href="#">Bosh sahifa</a>
<a href="#">Xizmatlar</a>
<a href="#">Narxlar</a>
<a href="#">Aloqa</a>
</nav>
</header>

<section class="hero">
<h1>Free Fire <span>Almaz Service</span></h1>
<p>Arzon va tez almaz yetkazib berish xizmati</p>

<a class="btn" href="https://t.me/">Buyurtma berish</a>
</section>

<section class="services">

<h2>Almaz paketlari</h2>

<div class="cards">

<div class="card">
<h3>100 Almaz</h3>
<div class="price">10 000 so'm</div>
</div>

<div class="card">
<h3>310 Almaz</h3>
<div class="price">25 000 so'm</div>
</div>

<div class="card">
<h3>520 Almaz</h3>
<div class="price">40 000 so'm</div>
</div>

<div class="card">
<h3>1060 Almaz</h3>
<div class="price">80 000 so'm</div>
</div>

</div>
</section>

<footer>
© 2026 Muinov Almaz Service
</footer>

</body>
</html>
